name: Build cross-platform artifacts

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y wget libgl1 libxkbcommon0
      - name: Create virtualenv + install deps
        run: |
          python -m venv venv
          . venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow
      - name: Build with PyInstaller
        run: |
          . venv/bin/activate
          python build_executable.py --verbose
      - name: Prepare AppImage (optional)
        run: |
          # prepare AppDir
          mkdir -p AppDir/usr/bin
          cp -r dist/PostureApp/* AppDir/usr/bin/
          # minimal desktop file
          cat > AppDir/PostureApp.desktop <<'EOF'
          [Desktop Entry]
          Name=PostureApp
          Exec=PostureApp/PostureApp
          Icon=office
          Type=Application
          Categories=Utility;
          EOF
          # download appimagetool
          wget -q https://github.com/AppImage/AppImageKit/releases/download/13/appimagetool-x86_64.AppImage -O appimagetool.AppImage
          chmod +x appimagetool.AppImage
          ./appimagetool.AppImage AppDir || true
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          path: |
            dist/PostureApp
            *.AppImage

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Create virtualenv + install deps
        run: |
          python -m venv venv
          . venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow
      - name: Build with PyInstaller
        run: |
          . venv/bin/activate
          python build_executable.py --verbose || python -m PyInstaller PostureApp.spec
      - name: Zip .app and upload
        run: |
          if [ -d "dist/PostureApp.app" ]; then
            ditto -c -k --sequesterRsrc --keepParent dist/PostureApp.app PostureApp-macos.zip
          else
            zip -r PostureApp-macos.zip dist/PostureApp || true
          fi
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dist
          path: PostureApp-macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Create virtualenv + install deps
        run: |
          python -m venv venv
          .\venv\Scripts\activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow
      - name: Build with PyInstaller
        run: |
          .\venv\Scripts\activate
          python build_executable.py --verbose || python -m PyInstaller PostureApp.spec
      - name: Archive Windows dist
        run: |
          powershell -Command "Compress-Archive -Path 'dist/PostureApp/*' -DestinationPath 'PostureApp-windows.zip'"
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: PostureApp-windows.zip
